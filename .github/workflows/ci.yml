name: CI

# Triggers: every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip               # cache pip deps between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Phase 1 tests
        run: pytest tests/test_phase1.py -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Coverage report
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=70    # fail if coverage drops below 70%

  # ── Job 2: Build Docker image ───────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test              # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t transit-optimizer:${{ github.sha }} .

      - name: Smoke test container
        run: |
          # Start container in background
          docker run -d --name smoke -p 8000:8000 transit-optimizer:${{ github.sha }}
          # Wait for startup
          sleep 15
          # Hit health endpoint
          curl --fail http://localhost:8000/ || (docker logs smoke && exit 1)
          # Clean up
          docker stop smoke && docker rm smoke
